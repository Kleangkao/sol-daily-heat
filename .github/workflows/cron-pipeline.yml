name: Production cron — pipeline

on:
  schedule:
    # Minute 7 avoids overlap with pulse (*/30) and cleanup (03:07 UTC).
    - cron: "7 */3 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    name: Pipeline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Run ingest + rankings on the runner — avoids Vercel 300s serverless timeouts (504).
      - name: Ingest sources
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-ingest.ts
      - name: Process rankings
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-pipeline.ts
