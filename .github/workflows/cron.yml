name: Production cron

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 */3 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  pulse:
    name: Market Pulse
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/cron/pulse
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/pulse" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  pipeline:
    name: Pipeline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      # Run ingest + rankings on the runner — avoids Vercel 300s serverless timeouts (504).
      - name: Ingest sources
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-ingest.ts
      - name: Process rankings
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/run-pipeline.ts

  cleanup-dry-run:
    name: Cleanup (dry-run)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/cron/cleanup?dry_run=1
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/cleanup?dry_run=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
