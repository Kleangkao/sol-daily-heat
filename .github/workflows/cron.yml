name: Production cron

on:
  schedule:
    - cron: "*/30 * * * *"
    - cron: "0 */3 * * *"
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  pulse:
    name: Market Pulse
    runs-on: ubuntu-latest
    if: github.event.schedule == '*/30 * * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/cron/pulse
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/pulse" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  pipeline:
    name: Pipeline
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 */3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/cron/pipeline
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/pipeline" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"

  cleanup-dry-run:
    name: Cleanup (dry-run)
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 3 * * *' || github.event_name == 'workflow_dispatch'
    steps:
      - name: POST /api/cron/cleanup?dry_run=1
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/cleanup?dry_run=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
