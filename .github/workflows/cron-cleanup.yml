name: Production cron — cleanup

on:
  schedule:
    # 03:07 UTC — daily, offset from pipeline (:07) and pulse (:00/:30).
    - cron: "7 3 * * *"
  workflow_dispatch:

jobs:
  cleanup-dry-run:
    name: Cleanup (dry-run)
    runs-on: ubuntu-latest
    steps:
      - name: POST /api/cron/cleanup?dry_run=1
        run: |
          curl -fsS -X POST "https://sol-daily-heat.vercel.app/api/cron/cleanup?dry_run=1" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json"
